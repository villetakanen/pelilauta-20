name: Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm check

      - name: Type check
        run: pnpm check:types

      - name: Build
        run: pnpm build

      - name: Unit Tests
        run: pnpm test

      - name: E2E Tests
        run: |
          pnpm exec playwright install --with-deps
          pnpm test:e2e
