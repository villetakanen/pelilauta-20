pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,svelte,astro}"
      run: npx @biomejs/biome check --write --staged {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    type-check:
      run: pnpm check:types
    test:
      run: pnpm test
