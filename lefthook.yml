pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,svelte,astro}"
      run: npx @biomejs/biome check --write --staged {staged_files}
      stage_fixed: true
    types:
      run: pnpm check:types
    astro:
      run: pnpm astro:check

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    build:
      run: pnpm build
    test:
      run: pnpm test
    spec-coverage:
      run: pnpm spec:coverage
    e2e:
      run: pnpm test:e2e
