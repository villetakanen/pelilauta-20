[build]
  command = "pnpm --filter pelilauta build"
  publish = "app/pelilauta/dist"

# Tell Netlify's function bundler to deploy firebase-admin as an external
# node module (not bundle it with esbuild). firebase-admin's transitive
# @grpc/grpc-js dep is CommonJS and relies on __dirname, which breaks when
# bundled into ESM. Vite already excludes it from the SSR chunk via
# astro.config.mjs vite.ssr.external; this block ensures the package files
# ship with the function so Node's require() can resolve it at runtime.
# See specs/pelilauta/firebase/spec.md §SSR Safety.
[functions.ssr]
  external_node_modules = ["firebase-admin"]

# Proxy Firebase Auth handler through the Netlify origin so the OAuth
# redirect round-trip stays first-party. Without this, browsers block the
# cross-site iframe handshake from <project>.firebaseapp.com back to our
# app origin (Chrome's storage partitioning treats netlify.app and
# firebaseapp.com as separate sites). PUBLIC_authDomain must be set to
# this Netlify site's hostname for the pattern to work.
# Reference: https://firebase.google.com/docs/auth/web/redirect-best-practices
[[redirects]]
  from = "/__/auth/*"
  to = "https://skaldbase.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"
  # Firebase client config is intentionally public (shipped in the browser bundle).
  # Exclude these keys from Netlify's strict-prefix secrets scanner so the build
  # doesn't fail if they get flagged as "secret" in the Netlify UI.
  SECRETS_SCAN_OMIT_KEYS = "PUBLIC_apiKey,PUBLIC_authDomain,PUBLIC_projectId,PUBLIC_storageBucket,PUBLIC_messagingSenderId,PUBLIC_appId,PUBLIC_measurementId,PUBLIC_databaseURL"
  # Disable Netlify's pattern-based "smart detection" scanning. It flags
  # PUBLIC_apiKey's value (pattern: "AIza..." — Google API key) as a likely
  # secret, but Firebase Web API keys are public by design (per Google's own
  # docs — access control is via Firebase Security Rules + App Check, not
  # key secrecy). Strict-prefix SECRET_* scanning still runs and enforces
  # the v20 classification invariant; see specs/pelilauta/firebase/spec.md
  # §Regression Guardrails.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
